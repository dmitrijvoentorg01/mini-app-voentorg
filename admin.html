    function navigateTo(url) { window.location.href = url; }

    var CATEGORIES = ["Оптика / Прицелы","Квадрокоптеры / FPV / БПЛА","НСУ / Ретрансляторы","Комплектующие для БПЛА","Электростанции / Генераторы","Броня / Экипировка","Мото / Квадроциклы","Усилители сигнала / Инкубаторы","Рации","Детекторы БПЛА","РЭБ","Гаджеты","Смартчасы","Спутниковый интернет"];
    var pendingPhotos = [], pendingReviewPhotos = [], reviewStars = 5, maintenanceMode = false;

    async function loadMaintenanceMode() { try { var r = await fetch(SETTINGS_URL + "?select=maintenance_mode&id=eq.1", { headers: getHeaders() }); var d = await r.json(); if (Array.isArray(d) && d.length > 0) maintenanceMode = d[0].maintenance_mode === true; } catch(e) {} }
    async function toggleMaintenance() { maintenanceMode = !maintenanceMode; try { await fetch(SETTINGS_URL + "?id=eq.1", { method: "PATCH", headers: getHeaders(), body: JSON.stringify({ maintenance_mode: maintenanceMode }) }); alert(maintenanceMode ? "🔴 Техперерыв включён!" : "🟢 Сайт открыт!"); } catch(e) { alert("❌ Ошибка"); } showMainMenu(); }

    var _ANNOUNCE_DEFAULT_TEXT = "🛒 *ВОЕНТОРГ — ваш надёжный поставщик*\n\n" +
      "✅ Оптика и прицелы\n" +
      "✅ Квадрокоптеры и FPV / БПЛА\n" +
      "✅ Броня и экипировка\n" +
      "✅ Рации, усилители сигнала\n" +
      "✅ Электростанции и генераторы\n" +
      "✅ И многое другое...\n\n" +
      "📦 Быстрая отправка. Проверенное качество.\n" +
      "👇 Открывайте магазин прямо сейчас!";
    var _ANNOUNCE_DEFAULT_BTN_TEXT = "📱 Открыть магазин";
    var _ANNOUNCE_DEFAULT_BTN_URL = "https://t.me/VOENTORG_MINI_APP_BOT?startapp";

    var _announcePhotoUrl = '';

    function sendAnnounce() {
      _announcePhotoUrl = '';
      openModal(
        '<h3 style="color:#f5c96a;margin-bottom:14px;">📢 Анонс в канал</h3>' +
        '<div class="form-label">Текст поста:</div>' +
        '<textarea class="form-textarea" id="announceText" style="min-height:160px;font-size:13px;line-height:1.5;">' + _ANNOUNCE_DEFAULT_TEXT + '</textarea>' +
        '<div class="form-label">Текст кнопки:</div>' +
        '<input class="form-input" id="announceBtnText" value="' + escapeHTML(_ANNOUNCE_DEFAULT_BTN_TEXT) + '">' +
        '<div class="form-label">Ссылка кнопки:</div>' +
        '<input class="form-input" id="announceBtnUrl" type="url" value="' + escapeHTML(_ANNOUNCE_DEFAULT_BTN_URL) + '">' +
        '<div class="form-label">Фото (необязательно):</div>' +
        '<div id="announcePhotoPreview" style="margin-bottom:8px;"></div>' +
        '<label style="display:block;width:100%;padding:10px;background:#000;color:#d4af37;border:1px solid #d4af37;border-radius:8px;font-weight:bold;cursor:pointer;font-size:13px;text-align:center;box-sizing:border-box;margin-bottom:12px;">' +
          '<img src="https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/ico_photo.png?v=1" style="width:14px;height:14px;vertical-align:middle;margin-right:4px;"> Загрузить фото' +
          '<input type="file" accept="image/*" style="display:none;" onchange="_announceUploadPhoto(this)">' +
        '</label>' +
        '<div style="display:flex;gap:8px;margin-top:4px;">' +
          '<button class="action-btn" style="flex:1;padding:14px;font-size:15px;" onclick="closeModal()">Отмена</button>' +
          '<button class="action-btn green" style="flex:2;padding:14px;font-size:15px;" onclick="_doSendAnnounce(this)">✉️ Отправить</button>' +
        '</div>'
      );
    }

    async function _announceUploadPhoto(input) {
      var file = input.files && input.files[0];
      if (!file) return;
      var preview = document.getElementById('announcePhotoPreview');
      if (preview) preview.innerHTML = '<div style="color:#d4af37;font-size:12px;">⏳ Загрузка...</div>';
      try {
        var compressed = await _compressImage(file, 800);
        var fn = 'announce_' + Date.now() + '.jpg';
        var fd = new FormData();
        fd.append('file', compressed, fn);
        var r = await fetch(STORAGE_UPLOAD_URL + '/' + fn, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'x-upsert': 'true' },
          body: fd
        });
        if (!r.ok) throw new Error('Ошибка загрузки: ' + r.status);
        _announcePhotoUrl = STORAGE_URL + '/' + fn;
        if (preview) preview.innerHTML =
          '<div style="position:relative;display:inline-block;">' +
            '<img src="' + _announcePhotoUrl + '" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid #d4af37;">' +
            '<span onclick="_announceClearPhoto()" style="position:absolute;top:-8px;right:-8px;width:20px;height:20px;background:#e53935;border-radius:50%;color:#fff;font-size:12px;text-align:center;line-height:20px;cursor:pointer;">✕</span>' +
          '</div>';
      } catch(e) {
        _announcePhotoUrl = '';
        if (preview) preview.innerHTML = '<div style="color:#e53935;font-size:12px;">❌ ' + e.message + '</div>';
      }
    }

    function _announceClearPhoto() {
      _announcePhotoUrl = '';
      var preview = document.getElementById('announcePhotoPreview');
      if (preview) preview.innerHTML = '';
    }

    async function _doSendAnnounce(btn) {
      var announceText = document.getElementById('announceText').value.trim();
      var btnText = document.getElementById('announceBtnText').value.trim();
      var btnUrl = document.getElementById('announceBtnUrl').value.trim();
      if (!announceText) { alert('❗ Введите текст поста'); return; }
      if (!btnText)      { alert('❗ Введите текст кнопки'); return; }
      if (!btnUrl)       { alert('❗ Введите ссылку кнопки'); return; }
      var photoUrl = _announcePhotoUrl;
      closeModal();
      if (!confirm('Отправить анонс-пост в канал?')) return;
      if (btn) { btn.style.opacity = '0.5'; btn.style.pointerEvents = 'none'; }
      try {
        var payload = {
          announce_text: announceText,
          button_text: btnText,
          button_url: btnUrl
        };
        if (photoUrl) payload.photo_url = photoUrl;
        var r = await fetch('https://wwhpxpxflkbrlhbarqmx.supabase.co/functions/v1/smart-task', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer sb_publishable_Fzk6Y9w1V3DOZ0Opn4m4lw_pynygFV8' },
          body: JSON.stringify(payload)
        });
        var d = await r.json();
        if (d.success) {
          alert('✅ Анонс отправлен и закреплён в канале!');
        } else {
          alert('❌ Ошибка: ' + (d.error || 'неизвестная ошибка'));
        }
      } catch(e) {
        alert('❌ Ошибка: ' + e.message);
      }
      if (btn) { btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; }
    }

    function showMainMenu() {
      var _ah = document.querySelector(".admin-header"); if (_ah) _ah.style.display = "block";
      var prevMode = maintenanceMode;
      // Показываем меню мгновенно с текущим состоянием
      var ml = maintenanceMode ? "🔴 Выключить" : "🟢 Включить";
      var mb = maintenanceMode ? "#e53935" : "#4caf50";

        "<div class=\"admin-card\" onclick=\"showOrders()\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/orders.png?v=1\" class=\"admin-icon\"><div class=\"label\">Заказы</div></div>" +
        "<div class=\"admin-card\" onclick=\"showProducts()\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/cart.png?v=1\" class=\"admin-icon\"><div class=\"label\">Товары</div></div>" +
        "<div class=\"admin-card\" onclick=\"showAnnouncements()\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/announcements.png?v=1\" class=\"admin-icon\"><div class=\"label\">Объявления</div></div>" +
        "<div class=\"admin-card\" onclick=\"showClients()\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/user.png?v=1\" class=\"admin-icon\"><div class=\"label\">Клиенты</div></div>" +
        "<div class=\"admin-card\" onclick=\"showAdminReviews()\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/reviews_icon.png?v=1\" class=\"admin-icon\"><div class=\"label\">Отзывы</div></div>" +
        "<div class=\"admin-card\" onclick=\"sendAnnounce()\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/announcements.png?v=1\" class=\"admin-icon\"><div class=\"label\">Анонс в канал</div></div>" +
        "<div class=\"admin-card\" onclick=\"toggleMaintenance()\" style=\"border-color:" + mb + "\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/settings.png?v=1\" class=\"admin-icon\"><div class=\"label\">Техперерыв</div><div class=\"desc\">" + ml + "</div></div>" +
        "</div>";
      document.getElementById("content").innerHTML = html;
      // Фоновое обновление maintenance_mode (без моргания)
      loadMaintenanceMode().then(function() {
        if (maintenanceMode !== prevMode) {
          // Изменилось — обновляем только кнопку техперерыва
          var cards = document.querySelectorAll('.admin-card');
          if (cards.length >= 7) {
            var lastCard = cards[6];
            var newMl = maintenanceMode ? "🔴 Выключить" : "🟢 Включить";
            var newMb = maintenanceMode ? "#e53935" : "#4caf50";
            lastCard.style.borderColor = newMb;
            var desc = lastCard.querySelector('.desc');
            if (desc) desc.textContent = newMl;
          }
        }
      });
    }

    function getStatusEmoji(s) {
      var base = 'https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/';
      var icons = {
        'Ожидает реквизитов': 'ico_pending.png',
        'Ожидает оплаты': 'ico_waiting.png',
        'Проверка оплаты': 'ico_waiting.png',
        'Оплачен': 'ico_paid.png',
        'Отправлен': 'ico_shipped.png',
        'Доставлен': 'ico_delivered.png',
        'Получен': 'ico_delivered.png',

    function getStatusBadge(p) { if (!p || !p.status) return { text: "", color: "" }; if (p.status === "available") return { text: "🟢 В наличии", color: "#4caf50" }; if (p.status === "sold") return { text: "🔴 Продано", color: "#e53935" }; return { text: "", color: "" }; }

      fetch('https://wwhpxpxflkbrlhbarqmx.supabase.co/functions/v1/notify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer sb_publishable_Fzk6Y9w1V3DOZ0Opn4m4lw_pynygFV8' },
        body: JSON.stringify(data)
      }).catch(function(){});

    async function changeOrderStatus(id, s) {
      if (!confirm("Сменить статус на «" + s + "»?")) return;
      try {
        await fetch(ORDERS_URL + "?id=eq." + id, { method: "PATCH", headers: getHeaders(), body: JSON.stringify({ status: s }) });
        var clientTgId = '';
        fetch(ORDERS_URL + '?select=telegram_id&id=eq.' + id, { headers: getHeaders() })
          .then(function(r){ return r.json(); })
          .then(function(rows) {
            if (Array.isArray(rows) && rows.length > 0) {
              clientTgId = rows[0].telegram_id || '';
              sendNotify({ action: 'status_change', order_id: id, status: s, track_number: '', client_telegram_id: clientTgId });
            } else {
              sendNotify({ action: 'status_change', order_id: id, status: s, track_number: '', client_telegram_id: '' });
            }
          }).catch(function() {
            sendNotify({ action: 'status_change', order_id: id, status: s, track_number: '', client_telegram_id: '' });
          });
        alert("✅ Готово!"); showOrders();
      } catch(e) { alert("❌ Ошибка"); }

    async function showOrders() {
      var _ah = document.querySelector(".admin-header"); if (_ah) _ah.style.display = "none";
      var c = document.getElementById("content");
      c.innerHTML = "<div class=\"page-back-btn\" onclick=\"showMainMenu()\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/back.png?v=1\" class=\"page-back-icon\"></div><div style=\"text-align:center;color:#d4af37;padding:20px;\">Загрузка...</div>";

        var r = await fetch(ORDERS_URL + "?select=*&order=id.desc&limit=100", { headers: getHeaders() });

    var _orderTimerInterval = null;
    var _adminExpiredOrders = {};
    function _startOrderTimers() {
      if (_orderTimerInterval) { clearInterval(_orderTimerInterval); _orderTimerInterval = null; }
      var timerEls = document.querySelectorAll('[id^="order_timer_"]');
      if (!timerEls.length) return;
      function _tick() {
        timerEls.forEach(function(el) {
          var sent = new Date(el.dataset.sent);
          var dur = parseInt(el.dataset.dur, 10) * 60 * 1000;
          var remaining = dur - (Date.now() - sent.getTime());
          if (remaining <= 0) {
            el.style.color = '#e53935';
            el.textContent = '⏰ Истекло';
            // При первом истечении — сменить статус и кнопки
            var oid = el.id.replace('order_timer_', '');
            if (!_adminExpiredOrders[oid]) {
              _adminExpiredOrders[oid] = true;
              // Меняем статус на Отменён
              fetch(ORDERS_URL + '?id=eq.' + oid, {
                method: 'PATCH',
                headers: getHeaders(),
                body: JSON.stringify({ status: 'Отменён', archived: false })
              }).catch(function(){});
              // Меняем кнопки: убираем «Изменить реквизиты» и «Отменить», оставляем только «Удалить»
              var card = el.closest('.list-item');
              if (card) {
                var btnWrap = card.querySelector('div[style*="margin-top:8px"]');
                if (btnWrap) {
                  btnWrap.innerHTML = '<button style="width:auto;padding:8px 16px;font-size:12px;border-radius:8px;margin-top:6px;font-weight:bold;cursor:pointer;background:#000;color:#e53935;border:2px solid #e53935;" onclick="deleteOrder(' + oid + ')"><img src="https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/ico_delete.png?v=1" style="width:16px;height:16px;vertical-align:middle;margin-right:3px;"> Удалить</button>';
                }
              }
            }
          } else {
            var totalSec = Math.floor(remaining / 1000);
            var mm = String(Math.floor(totalSec / 60)).padStart(2, '0');
            var ss = String(totalSec % 60).padStart(2, '0');
            el.style.color = '#ff9800';
            el.textContent = '⏳ ' + mm + ':' + ss;
          }
        });
      }
      _tick();
      _orderTimerInterval = setInterval(_tick, 1000);
    }

    // ── Заглавные буквы ФИО ──
    function _titleCase(inp) {
      var pos = inp.selectionStart;
      inp.value = inp.value.replace(/(?:^|\s)\S/g, function(ch) { return ch.toUpperCase(); });
      inp.setSelectionRange(pos, pos);
    }

    // ── Маска телефона для СБП ──
    function _adminPhoneMask(inp) {
      // 1. Пустое поле — не трогаем
      if (inp.value.trim() === "") return;
      // 2. Сохраняем позицию курсора: считаем цифры до него
      var pos = inp.selectionStart;
      var digitsBeforeCursor = inp.value.slice(0, pos).replace(/\D/g, "").length;
      // Форматирование
      var v = inp.value.replace(/\D/g, "");
      if (v.charAt(0) === "8") v = "7" + v.slice(1);
      if (v.charAt(0) !== "7") v = "7" + v;
      v = v.slice(0, 11);
      var r = "+7";
      if (v.length > 1) r += " (" + v.slice(1, 4);
      if (v.length >= 4) r += ") " + v.slice(4, 7);
      if (v.length >= 7) r += "-" + v.slice(7, 9);
      if (v.length >= 9) r += "-" + v.slice(9, 11);
      inp.value = r;
      // 3. Восстанавливаем курсор: проходим по результату, считаем цифры до digitsBeforeCursor
      var newPos = 0, cnt = 0;
      while (newPos < r.length && cnt < digitsBeforeCursor) {
        if (/\d/.test(r[newPos])) cnt++;
        newPos++;
      }
      if (newPos > r.length) newPos = r.length;
      inp.setSelectionRange(newPos, newPos);
    }

    // ── Маска номера карты (16 цифр, группы по 4) ──
    function _cardMask(inp) {
      var v = inp.value.replace(/\D/g, "").slice(0, 16);
      inp.value = v.replace(/(\d{4})(?=\d)/g, "$1 ");
    }

    var BANKS_LIST = ["Сбербанк", "Т-Банк", "ВТБ", "Альфа-Банк", "Газпромбанк", "Промсвязьбанк", "Другой банк"];

    // Определяет тип оплаты из payment_method ("СБП / ВТБ" → "СБП")
    function _parsePayType(pm) {
      if (!pm) return "Карта";
      var left = (pm.split("/")[0] || "").trim().toLowerCase();
      if (left.indexOf("сбп") !== -1) return "СБП";
      if (left.indexOf("qr") !== -1) return "QR";
      return "Карта";
    }

    // Извлекает банк клиента из payment_method ("СБП / ВТБ" → "ВТБ")
    function _parseClientBank(pm) {
      if (!pm) return "";
      var parts = pm.split("/");
      return parts.length > 1 ? parts[1].trim() : "";
    }

    function parsePhotos(raw) { if (!raw) return []; if (Array.isArray(raw)) return raw.filter(function(x) { return x && typeof x === "string" && x.indexOf("http") !== -1; }); if (typeof raw === "string") { try { var j = JSON.parse(raw); if (Array.isArray(j)) return j.filter(function(x) { return x && x.indexOf("http") === 0; }); } catch(e) {} return raw.split(/[,\n]/).map(function(x) { return x.trim(); }).filter(function(x) { return x && x.indexOf("http") === 0; }); } return []; }

    async function _compressImage(file, maxW) {
      maxW = maxW || 800;
      return new Promise(function(resolve) {
        var reader = new FileReader();
        reader.onload = function(e) {
          var img = new Image();
          img.onload = function() {
            var w = img.width, h = img.height;
            if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
            var canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            canvas.toBlob(function(blob) { resolve(blob || file); }, "image/jpeg", 0.8);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

        }

      } catch(e) {
        c.innerHTML = '<div class="page-back-btn" onclick="showMainMenu()"><img src="https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/back.png?v=1" class="page-back-icon"></div><div style="text-align:center;padding:20px;color:#e53935;">Ошибка: ' + e.message + '</div>';
      }
    }

    async function unblockClient(telegramId) {
      if (!confirm("Разблокировать клиента " + telegramId + "?")) return;
      try {
        await fetch(CLIENTS_URL + "?telegram_id=eq." + telegramId, {
          method: "PATCH",
          headers: getHeaders(),
          body: JSON.stringify({ blocked_until: null })
        });
        alert("✅ Клиент разблокирован!");
        showClients();
      } catch(e) { alert("❌ Ошибка: " + e.message); }
    }

    // ── Пагинация: глобальное состояние ──
    var _adminProdAll = [], _adminProdShown = 0, _adminProdContainer = null, _adminProdFiltered = [];
    var _adminAnnAll  = [], _adminAnnShown  = 0, _adminAnnContainer  = null;
    var _adminRevAll  = [], _adminRevShown  = 0, _adminRevContainer  = null;

    function _changeStock(productId, delta, btn) {
      var el = document.getElementById('stockVal_' + productId);
      if (!el) return;
      var cur = parseInt(el.textContent, 10) || 0;
      var newVal = Math.max(0, cur + delta);
      el.textContent = newVal;
      if (btn) { btn.disabled = true; setTimeout(function(){ btn.disabled = false; }, 300); }
      // Сохраняем в Supabase
      fetch(SUPABASE_URL + '?id=eq.' + productId, {
        method: 'PATCH',
        headers: getHeaders(),
        body: JSON.stringify({ stock: newVal })
      }).catch(function(){});
    }

    function _filterAdminProducts() {
      var sel = document.getElementById("adminCatFilter");
      var cat = sel ? sel.value : "all";
      _adminProdFiltered = cat === "all" ? _adminProdAll.slice() : _adminProdAll.filter(function(p) { return p.category === cat; });
      _adminProdShown = 0;
      _adminProdRender(true);
    }

    function _adminProdRender(keepFilter) {
      var _ah = document.querySelector(".admin-header"); if (_ah) _ah.style.display = "none";
      var c = _adminProdContainer; if (!c) return;

      // При первом рендере (keepFilter не задан) сбрасываем фильтр
      if (!keepFilter) {
        _adminProdFiltered = _adminProdAll.slice();
      }

      var list = _adminProdFiltered;
      var catOpts = "<option value=\"all\">Все категории</option>" +
        CATEGORIES.map(function(x) { return "<option value=\"" + x + "\">" + x + "</option>"; }).join("");

      var h = "<div class=\"page-back-btn\" onclick=\"showMainMenu()\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/back.png?v=1\" class=\"page-back-icon\"></div>" +
        "<h2 id=\"adminProdTitle\" style=\"text-align:center;color:#f5c96a;\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/cart.png?v=1\" class=\"section-icon\"> Товары (" + list.length + ")</h2>" +
        "<button class=\"action-btn green\" style=\"width:calc(100% - 20px);margin:10px;padding:14px;font-size:16px;\" onclick=\"showAddProductForm()\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/ico_add.png?v=1\" style=\"width:16px;height:16px;vertical-align:middle;margin-right:3px;\"> Добавить товар</button>" +
        "<select id=\"adminCatFilter\" class=\"form-select\" onchange=\"_filterAdminProducts()\" style=\"margin:10px;width:calc(100% - 20px);\">" + catOpts + "</select>";

      var end = Math.min(_adminProdShown + 10, list.length);
      list.slice(_adminProdShown, end).forEach(function(p) {
        var sb = getStatusBadge(p);
        h += "<div class=\"list-item\"><div><b>🆔 " + p.id + "</b> — " + escapeHTML((p.title || "—").substring(0, 50)) + "</div>";
        h += "<div style=\"color:#f5c96a;\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/price.png?v=1\" style=\"width:18px;height:18px;vertical-align:middle;\"> " + (p.price || "—") + " | " + escapeHTML(p.category || "—") + "</div>";
        if (sb.text) h += "<div style=\"color:" + sb.color + ";font-weight:bold;\">" + sb.text + "</div>";
        h += "<div style=\"margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;\">" +
          "<div style=\"display:inline-flex;align-items:center;border:1px solid #d4af37;border-radius:6px;overflow:hidden;\">" +
            "<button onclick=\"_changeStock(" + p.id + ",-1,this)\" style=\"width:28px;height:28px;background:#000;color:#d4af37;border:none;font-size:16px;cursor:pointer;line-height:1;\">−</button>" +
            "<span id=\"stockVal_" + p.id + "\" style=\"min-width:30px;text-align:center;font-size:12px;font-weight:bold;color:#fff;background:#111;padding:0 4px;line-height:28px;display:inline-block;\">" + (p.stock || 1) + "</span>" +
            "<button onclick=\"_changeStock(" + p.id + ",1,this)\" style=\"width:28px;height:28px;background:#000;color:#d4af37;border:none;font-size:16px;cursor:pointer;line-height:1;\">+</button>" +
          "</div>" +
          "<button class=\"action-btn\" onclick=\"showEditProductForm(" + p.id + ")\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/ico_edit.png?v=1\" style=\"width:14px;height:14px;vertical-align:middle;\"></button>" +
          "<button class=\"action-btn red\" onclick=\"deleteProduct(" + p.id + ")\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/ico_delete.png?v=1\" style=\"width:14px;height:14px;vertical-align:middle;\"></button>" +
        "</div></div>";
      });
      _adminProdShown = end;
      if (_adminProdShown < list.length) {
        h += "<button style=\"width:calc(100% - 20px);margin:10px;padding:12px;background:#000;color:#d4af37;border:2px solid #d4af37;border-radius:12px;font-weight:bold;cursor:pointer;font-size:14px;\" onclick=\"_adminProdRender(true)\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/ico_add.png?v=1\" style=\"width:16px;height:16px;vertical-align:middle;margin-right:3px;\"> Показать ещё (" + (list.length - _adminProdShown) + ")</button>";
      }

      // Запоминаем текущий выбор фильтра до перерисовки
      var prevCat = "all";
      var prevSel = document.getElementById("adminCatFilter");
      if (prevSel) prevCat = prevSel.value;

      c.innerHTML = h;

      // Восстанавливаем выбор фильтра после перерисовки
      var newSel = document.getElementById("adminCatFilter");
      if (newSel && keepFilter) newSel.value = prevCat;

      var titleEl = document.getElementById("adminProdTitle");
      if (titleEl) titleEl.scrollIntoView({ behavior: "smooth" });
    }

    function _adminAnnRender() {
      var _ah = document.querySelector(".admin-header"); if (_ah) _ah.style.display = "none";
      var c = _adminAnnContainer; if (!c) return;
      var h = "<div class=\"page-back-btn\" onclick=\"showMainMenu()\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/back.png?v=1\" class=\"page-back-icon\"></div>" +
        "<h2 id=\"adminAnnTitle\" style=\"text-align:center;color:#f5c96a;\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/announcements.png?v=1\" class=\"section-icon\"> Объявления (" + _adminAnnAll.length + ")</h2>" +
        "<button class=\"action-btn green\" style=\"width:calc(100% - 20px);margin:10px;padding:14px;font-size:16px;\" onclick=\"showAddAnnouncementForm()\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/ico_add.png?v=1\" style=\"width:16px;height:16px;vertical-align:middle;margin-right:3px;\"> Добавить объявление</button>";
      if (_adminAnnAll.length === 0) { h += "<div style=\"text-align:center;padding:20px;opacity:0.7;\">Объявлений пока нет</div>"; c.innerHTML = h; return; }
      var end = Math.min(_adminAnnShown + 10, _adminAnnAll.length);
      _adminAnnAll.slice(_adminAnnShown, end).forEach(function(p) {
        h += "<div class=\"list-item\"><div><b>🆔 " + p.id + "</b> — " + escapeHTML((p.title || "—").substring(0, 60)) + "</div><div style=\"margin-top:6px;\"><button class=\"action-btn\" onclick=\"showEditAnnouncementForm(" + p.id + ")\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/ico_edit.png?v=1\" style=\"width:14px;height:14px;vertical-align:middle;\"></button> <button class=\"action-btn red\" onclick=\"deleteProduct(" + p.id + ")\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/ico_delete.png?v=1\" style=\"width:14px;height:14px;vertical-align:middle;\"></button></div></div>";
      });
      _adminAnnShown = end;
      if (_adminAnnShown < _adminAnnAll.length) {
        h += "<button style=\"width:calc(100% - 20px);margin:10px;padding:12px;background:#000;color:#d4af37;border:2px solid #d4af37;border-radius:12px;font-weight:bold;cursor:pointer;font-size:14px;\" onclick=\"_adminAnnRender()\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/ico_add.png?v=1\" style=\"width:16px;height:16px;vertical-align:middle;margin-right:3px;\"> Показать ещё (" + (_adminAnnAll.length - _adminAnnShown) + ")</button>";
      }
      c.innerHTML = h;
      var titleEl = document.getElementById("adminAnnTitle");
      if (titleEl) titleEl.scrollIntoView({ behavior: "smooth" });
    }

    function _adminRevRender() {
      var _ah = document.querySelector(".admin-header"); if (_ah) _ah.style.display = "none";
      var c = _adminRevContainer; if (!c) return;
      var h = "<div class=\"page-back-btn\" onclick=\"showMainMenu()\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/back.png?v=1\" class=\"page-back-icon\"></div>" +
        "<h2 id=\"adminRevTitle\" style=\"text-align:center;color:#f5c96a;\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/reviews_icon.png?v=1\" class=\"section-icon\"> Отзывы (" + _adminRevAll.length + ")</h2>" +
        "<button class=\"action-btn green\" style=\"width:calc(100% - 20px);margin:10px;padding:14px;font-size:16px;\" onclick=\"showAddReviewForm()\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/ico_add.png?v=1\" style=\"width:16px;height:16px;vertical-align:middle;margin-right:3px;\"> Добавить отзыв</button>";
      if (_adminRevAll.length === 0) { h += "<div style=\"text-align:center;padding:20px;opacity:0.7;\">Отзывов пока нет</div>"; c.innerHTML = h; return; }
      var end = Math.min(_adminRevShown + 10, _adminRevAll.length);
      _adminRevAll.slice(_adminRevShown, end).forEach(function(rv) {
        var stars = ""; for (var i = 1; i <= 5; i++) stars += i <= rv.stars ? "⭐" : "☆";
        var photos = parseReviewPhotos(rv.photos);
        h += "<div class=\"list-item\"><div><b>👤 " + escapeHTML(rv.name || "Аноним") + "</b> — " + stars + "</div>";
        h += "<div style=\"font-size:13px;color:#ccc;\">" + escapeHTML((rv.text || "").substring(0, 80)) + "</div>";
        if (photos.length > 0) h += "<div style=\"margin-top:4px;\">" + photos.map(function(p) { return "<img src=\"" + p + "\" style=\"width:40px;height:40px;object-fit:cover;border-radius:6px;margin:2px;\">"; }).join("") + "</div>";
        h += "<div style=\"font-size:11px;color:#888;\">" + formatDate(rv.date) + "</div>";
        h += "<div style=\"margin-top:6px;\"><button class=\"action-btn\" onclick=\"showEditReviewForm(" + rv.id + ")\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/ico_edit.png?v=1\" style=\"width:14px;height:14px;vertical-align:middle;\"></button> <button class=\"action-btn red\" onclick=\"deleteReview(" + rv.id + ")\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/ico_delete.png?v=1\" style=\"width:14px;height:14px;vertical-align:middle;\"></button></div></div>";
      });
      _adminRevShown = end;
      if (_adminRevShown < _adminRevAll.length) {
        h += "<button style=\"width:calc(100% - 20px);margin:10px;padding:12px;background:#000;color:#d4af37;border:2px solid #d4af37;border-radius:12px;font-weight:bold;cursor:pointer;font-size:14px;\" onclick=\"_adminRevRender()\"><img src=\"https://wwhpxpxflkbrlhbarqmx.supabase.co/storage/v1/object/public/icons/ico_add.png?v=1\" style=\"width:16px;height:16px;vertical-align:middle;margin-right:3px;\"> Показать ещё (" + (_adminRevAll.length - _adminRevShown) + ")</button>";
      }
      c.innerHTML = h;
      var titleEl = document.getElementById("adminRevTitle");
      if (titleEl) titleEl.scrollIntoView({ behavior: "smooth" });
    }

    showMainMenu();
  </script>
</body>
</html>
